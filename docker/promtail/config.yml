server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: api-pino
    static_configs:
      - targets:
          - localhost
        labels:
          job: api-pino
          service: api
          __path__: /var/log/api/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            time: time
            msg: msg
            context: context
            reqId: reqId
      - labels:
          level:
          service:
      - timestamp:
          source: time
          format: RFC3339

  - job_name: caddy
    static_configs:
      - targets:
          - localhost
        labels:
          job: caddy
          service: caddy
          __path__: /var/log/caddy/*.log

  - job_name: docker-frontend
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['container']
        regex: 'frontend'
        action: keep
      - target_label: job
        replacement: docker-frontend
      - target_label: service
        replacement: frontend

  - job_name: docker-infra
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['container']
        regex: 'postgres|redis|pg-backup'
        action: keep
      - source_labels: ['container']
        target_label: service
      - target_label: job
        replacement: docker-infra
